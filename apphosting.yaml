# Configuration for Firebase App Hosting
# Docs: https://firebase.google.com/docs/app-hosting/configure

headers:
  - path: /**
    headers:
      - key: X-Frame-Options
        value: DENY

env:
  # The production Ruby API url on Render
  - variable: RUBY_API_URL
    value: "https://zeepod-api-1.onrender.com/api/v1/waitlist"
